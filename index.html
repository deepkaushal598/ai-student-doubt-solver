<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Student Doubt Solver</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            height: 85vh;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                height: auto;
            }
        }

        /* Sidebar */
        .sidebar {
            background: linear-gradient(180deg, #2c3e50 0%, #34495e 100%);
            padding: 25px;
            overflow-y: auto;
            color: white;
        }

        .sidebar h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: #ecf0f1;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar h2::before {
            content: "🤖";
            font-size: 22px;
        }

        .model-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .model-item {
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid transparent;
        }

        .model-item:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateX(5px);
        }

        .model-item.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: white;
        }

        .model-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .model-type {
            font-size: 12px;
            opacity: 0.8;
        }

        /* Main Chat Area */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .chat-header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .chat-header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            scroll-behavior: smooth;
            height: 100%;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 15px;
            border-radius: 12px;
            word-wrap: break-word;
            line-height: 1.4;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px 0 15px 15px;
        }

        .message.assistant .message-content {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
            border-radius: 0 15px 15px 15px;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: #667eea;
            color: white;
            order: 2;
        }

        .message.assistant .message-avatar {
            background: #764ba2;
            color: white;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 15px;
            background: white;
            border-radius: 12px;
            width: fit-content;
            border: 1px solid #e0e0e0;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #764ba2;
            animation: bounce 1.4s infinite;
        }

        .typing-dot:nth-child(1) {
            animation-delay: 0s;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {

            0%,
            60%,
            100% {
                transform: translateY(0);
            }

            30% {
                transform: translateY(-10px);
            }
        }

        /* Input Area */
        .chat-input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            flex: 1;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            padding: 12px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status-bar {
            padding: 10px 20px;
            background: #f0f0f0;
            font-size: 12px;
            color: #666;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .selected-model {
            font-weight: 600;
            color: #667eea;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #999;
            gap: 15px;
        }

        .empty-state-icon {
            font-size: 60px;
            opacity: 0.3;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px 15px;
            border-radius: 8px;
            border-left: 4px solid #c33;
            margin: 10px 0;
        }

        .success-badge {
            display: inline-block;
            background: #d4edda;
            color: #155724;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 8px;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <h2>AI Agents</h2>
            <div class="model-list" id="modelList"></div>
        </div>

        <!-- Chat Area -->
        <div class="chat-container">
            <div class="chat-header">
                <h1>📚 Student Doubt Solver</h1>
                <p>Ask any academic question and get instant help</p>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="empty-state">
                    <div class="empty-state-icon">💭</div>
                    <div>Select an AI agent and start asking your doubts!</div>
                </div>
            </div>

            <div class="status-bar">
                <span>Using: <span class="selected-model" id="currentModel">GPT-4 Turbo</span></span>
                <span id="connectionStatus">✓ Ready</span>
            </div>

            <div class="chat-input-area">
                <div class="input-group">
                    <input type="text" id="userInput" placeholder="Ask your doubt here... (Press Enter or click Send)"
                        autocomplete="off">
                    <button id="sendBtn" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedModel = 'gpt-4';
        let isLoading = false;

        // Initialize models
        async function initializeModels() {
            try {
                const response = await fetch('/api/models');
                const models = await response.json();

                const modelList = document.getElementById('modelList');
                modelList.innerHTML = '';

                models.forEach(model => {
                    const item = document.createElement('div');
                    item.className = `model-item ${model.id === selectedModel ? 'active' : ''}`;
                    item.innerHTML = `
                        <div class="model-name">${model.name}</div>
                        <div class="model-type">${model.type}</div>
                    `;
                    item.onclick = () => selectModel(model.id, item);
                    modelList.appendChild(item);
                });
            } catch (error) {
                console.error('Error loading models:', error);
            }
        }

        function selectModel(modelId, element) {
            selectedModel = modelId;

            document.querySelectorAll('.model-item').forEach(item => {
                item.classList.remove('active');
            });
            element.classList.add('active');

            const modelName = element.querySelector('.model-name').textContent;
            document.getElementById('currentModel').textContent = modelName;

            clearChat();
        }

        function addMessage(content, isUser = false, modelUsed = null) {
            const chatMessages = document.getElementById('chatMessages');

            if (chatMessages.querySelector('.empty-state')) {
                chatMessages.innerHTML = '';
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'assistant'}`;

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = isUser ? '👤' : '🤖';

            const content_div = document.createElement('div');
            content_div.className = 'message-content';

            if (isUser) {
                content_div.textContent = content;
            } else {
                content_div.innerHTML = content;
                if (modelUsed) {
                    content_div.innerHTML += `<div class="success-badge">Via ${modelUsed}</div>`;
                }
            }

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(content_div);
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            // Force scroll with multiple attempts and delay
            setTimeout(() => {
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }, 0);
            setTimeout(() => {
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }, 10);
            setTimeout(() => {
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }, 50);
        }

        function addTypingIndicator() {
            const chatMessages = document.getElementById('chatMessages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            `;
            chatMessages.appendChild(typingDiv);

            // Force scroll with multiple attempts
            setTimeout(() => {
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }, 0);
            setTimeout(() => {
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }, 10);
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) {
                indicator.remove();
            }
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();

            if (!message || isLoading) return;

            isLoading = true;

            document.getElementById('sendBtn').disabled = true;

            addMessage(message, true);

            input.value = '';

            addTypingIndicator();

            document.getElementById('connectionStatus').textContent =
                '🤖 AI Agents Thinking...';

            // Auto scroll
            const chatMessages = document.getElementById('chatMessages');
            chatMessages.scrollTop = chatMessages.scrollHeight;

            try {

                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: message,
                        model: selectedModel
                    })
                });

                const data = await response.json();

                removeTypingIndicator();

                if (response.ok && data.success) {
                    const formattedResponse = (data.response || data.reply)
                        .replace(/\n/g, '<br>')
                        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                        .replace(/\*(.*?)\*/g, '<em>$1</em>');

                    addMessage(formattedResponse, false, data.model_used);

                    document.getElementById('connectionStatus').textContent =
                        '✅ Agents Ready';

                } else {

                    const errorMsg = data.error || 'Failed to get response';

                    addMessage(
                        `<span style="color: #c33;">⚠️ ${errorMsg}</span>`,
                        false
                    );
                }

            } catch (error) {

                removeTypingIndicator();

                addMessage(
                    `<span style="color: #c33;">⚠️ Error: ${error.message}</span>`,
                    false
                );

                document.getElementById('connectionStatus').textContent = '✗ Error';

            } finally {

                isLoading = false;

                document.getElementById('sendBtn').disabled = false;

                input.focus();

                // Auto scroll after response
                const chatMessages = document.getElementById('chatMessages');
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
        }

        function clearChat() {
            const chatMessages = document.getElementById('chatMessages');
            chatMessages.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">💭</div>
                    <div>Chat cleared. Ready to help!</div>
                </div>
            `;
        }

        // Event listeners
        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !isLoading) {
                sendMessage();
            }
        });

        // Initialize
        initializeModels();
        document.getElementById('currentModel').textContent = 'GPT-4 Turbo';
    </script>
</body>

</html>
